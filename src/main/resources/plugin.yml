name: ajLeaderboards
version: "@VERSION@"
main: us.ajg0702.leaderboards.LeaderboardPlugin
folia-supported: true
author: ajgeiss0702
depend: [PlaceholderAPI]
softdepend: [Vault, SkinsRestorer]
description: Leaderboards for your server
api-version: 1.13
commands:
   ajleaderboards:
      aliases: [ajlb, ajl, alb]
      description: Commands for ajLeaderboards
      permission: ajleaderboards.use
   leaderboard:
      aliases: [lb]
      description: Open leaderboard GUI
   profile:
      description: View player stats profile
permissions:
   ajleaderboards.use:
      description: Allows you to set up the plugin
      default: op
   ajleaderboards.leaderboard:
      description: Open leaderboard GUI
      default: true
   ajleaderboards.profile:
      description: View player stats profile
      default: true
